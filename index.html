<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traductor Nuestra lengua</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

  <h1>🌎 Traductor Nuetra Lengua</h1>

  <div class="controls">
    <select id="fromLang">
      <option value="es">Español</option>
      <option value="zap">Zapoteco</option>
    </select>

    <button id="swapBtn">⇄</button>

    <select id="toLang">
      <option value="zap">Zapoteco</option>
      <option value="es">Español</option>
    </select>
  </div>

  <textarea id="inputText" placeholder="Escribe una palabra..."></textarea>

  <button id="translateBtn">Traducir</button>

  <div class="result-box">
    <h3>Resultado</h3>
    <p id="result">...</p>
  </div>

  <div class="search-box">
    <input type="text" id="searchWord" placeholder="Buscar palabra">
    <button id="searchBtn">Buscar</button>
  </div>


  <div class="menu-wrapper">
  <button id="menuBtn" class="menu-btn">☰ Categorías</button>

  <div id="categoriesPanel" class="categories-panel hidden">
    <div id="categoriesContainer"></div>
  </div>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
